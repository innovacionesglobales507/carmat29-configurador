<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CAR MATS 29 - TERMINAL IA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Exo+2:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #39ff14; --dark: #0a0a0a; }
        body { background: transparent; color: #fff; font-family: 'Exo 2', sans-serif; margin: 0; padding: 10px; }
        .main-card { background: rgba(0,0,0,0.95); border: 2px solid var(--neon); border-radius: 25px; padding: 25px; box-shadow: 0 0 30px rgba(57,255,20,0.15); text-align: center; }
        .logo-header { font-family: 'Rajdhani'; font-size: 28px; color: var(--neon); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 20px; border-bottom: 1px solid rgba(57,255,20,0.2); padding-bottom: 10px; }
        
        /* Área de Carga Visual */
        .upload-zone { border: 2px dashed rgba(57,255,20,0.4); border-radius: 20px; padding: 30px 15px; background: rgba(57,255,20,0.03); margin-bottom: 20px; transition: 0.3s; }
        .instruction-text { font-family: 'Rajdhani'; font-size: 20px; color: var(--neon); margin-bottom: 10px; }
        .sub-text { font-size: 14px; color: #888; margin-bottom: 20px; line-height: 1.4; }

        /* Botones de Acción */
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-upload { background: #111; border: 1px solid var(--neon); color: #fff; padding: 15px; border-radius: 12px; font-weight: 600; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-upload:active { background: var(--neon); color: #000; }
        .btn-primary { grid-column: span 2; background: var(--neon); color: #000; border: none; font-family: 'Rajdhani'; font-weight: 700; font-size: 18px; box-shadow: 0 5px 15px rgba(57,255,20,0.3); margin-top: 10px; }

        /* Scanner Animation */
        .scanner-wrap { position: relative; width: 100%; height: 250px; border-radius: 15px; overflow: hidden; border: 1px solid var(--neon); }
        .scan-bar { width: 100%; height: 3px; background: var(--neon); position: absolute; top: 0; box-shadow: 0 0 15px var(--neon); animation: scanning 2s linear infinite; z-index: 5; }
        @keyframes scanning { 0% { top: 0%; } 100% { top: 100%; } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useRef } = React;
        const RAILWAY_URL = "https://carmat-server-production.up.railway.app/analyze";

        function App() {
            const [step, setStep] = useState('home');
            const [image, setImage] = useState(null);
            const fileInput = useRef();

            const onFileSelect = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    setImage({ preview: ev.target.result, base64: ev.target.result.split(',')[1], mime: file.type });
                    setStep('scanning');
                    autoAnalyze(ev.target.result.split(',')[1], file.type);
                };
                reader.readAsDataURL(file);
            };

            const autoAnalyze = async (base64, mime) => {
                try {
                    const res = await fetch(RAILWAY_URL, {
                        method: "POST", headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ image: base64, mimeType: mime })
                    });
                    // Aquí el sistema absorbe la información del auto (marca, modelo, etc)
                    setStep('questions'); 
                } catch (e) { setStep('questions'); }
            };

            return (
                <div className="main-card">
                    <div className="logo-header">CAR MATS 29</div>

                    {step === 'home' && (
                        <div>
                            <div className="upload-zone">
                                <div style={{fontSize: '50px', marginBottom: '10px'}}>🚘</div>
                                <div className="instruction-text">ESCANEO IA DE VEHÍCULO</div>
                                <div className="sub-text">Sube una foto para que nuestra IA identifique tu modelo y personalice tus alfombras 5D.</div>
                                
                                <div className="action-grid">
                                    <button className="btn-upload" onClick={() => fileInput.current.click()}>
                                        <span>📂 GALERÍA</span>
                                    </button>
                                    <button className="btn-upload" onClick={() => fileInput.current.click()}>
                                        <span>📸 CÁMARA</span>
                                    </button>
                                    <input type="file" ref={fileInput} hidden accept="image/*" onChange={onFileSelect} />
                                </div>
                            </div>
                        </div>
                    )}

                    {step === 'scanning' && (
                        <div>
                            <div className="instruction-text">IDENTIFICANDO MODELO...</div>
                            <div className="scanner-wrap">
                                <img src={image?.preview} style={{width:'100%', height:'100%', objectFit:'cover'}} />
                                <div className="scan-bar"></div>
                            </div>
                            <p style={{color: var(--neon), marginTop: '15px', fontSize: '12px'}}>EXTRAYENDO DATOS TÉCNICOS...</p>
                        </div>
                    )}

                    {step === 'questions' && (
                        <div style={{padding: '20px 0'}}>
                            <div className="instruction-text" style={{color: '#fff'}}>¡VEHÍCULO DETECTADO!</div>
                            <p>Iniciando configuración de fabricación...</p>
                            {/* Aquí siguen las preguntas de asientos, envío, etc. */}
                        </div>
                    )}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
