<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CAR MATS 29 - LOGÍSTICA GLOBAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Exo+2:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #39ff14; --premium: #ffd700; --dark: rgba(0,0,0,0.95); }
        body { background: transparent; color: #fff; font-family: 'Exo 2', sans-serif; margin: 0; padding: 5px; }
        .card { background: var(--dark); border: 2px solid var(--neon); border-radius: 20px; padding: 15px; box-shadow: 0 0 20px rgba(57,255,20,0.2); }
        .q-title { color: var(--neon); font-family: 'Rajdhani'; font-size: 20px; text-align: center; margin-bottom: 15px; text-transform: uppercase; }
        .btn-opt { width: 100%; padding: 12px; margin-bottom: 8px; border-radius: 10px; border: 1px solid var(--neon); background: transparent; color: #fff; font-weight: 600; cursor: pointer; text-align: left; font-size: 13px; }
        .btn-premium { border-color: var(--premium); color: var(--premium); background: rgba(255,215,0,0.1); }
        .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .input-f { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--neon); background: #111; color: #fff; margin-bottom: 8px; font-size: 13px; box-sizing: border-box; }
        .full { grid-column: span 2; }
        .price-tag { float: right; color: var(--neon); font-weight: 700; }
        .btn-buy { background: var(--neon); color: #000; border: none; font-weight: 700; width: 100%; padding: 18px; border-radius: 12px; font-size: 16px; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [step, setStep] = useState(0);
            const [form, setForm] = useState({});

            const next = (field, val) => { setForm({...form, [field]: val}); setStep(step + 1); };

            const steps = [
                { t: "Configuración de Asientos", f: "seats", opts: ["2 Pasajeros", "5 Pasajeros ($290+)", "7 Pasajeros", "9-15 Pasajeros"] },
                { t: "Uso y Protección", f: "usage", opts: ["Familiar (Niños/Mascotas)", "Trabajo Pesado", "Premium / Exhibición"] },
                { t: "Personalización", f: "label", opts: ["Nombre y Apellido", "Logo de Marca Original"] },
                { t: "Método de Envío", f: "shipping", opts: [
                    "🚀 LOGÍSTICA PREMIUM - GRATIS (5-10 días)",
                    "✈️ AÉREO DDP - $10.00/kg (5-10 días)",
                    "⚡ EXPRÉS - $15.00/kg (2-4 días)",
                    "🚢 MARÍTIMO - $4.40/kg (25-30 días)"
                ]},
                { t: "Datos de Entrega", type: "address" },
                { t: "Finalizar Pedido", type: "pay" }
            ];

            const curr = steps[step];

            const sendWA = (pay) => {
                const text = `NUEVO PEDIDO CAR MATS 29:
                - Modelo: ${form.seats}
                - Uso: ${form.usage}
                - Personalización: ${form.label}
                - Envío: ${form.shipping}
                - Cliente: ${form.name} (${form.dni})
                - País: ${form.country}, ${form.city}
                - Pago: ${pay}`;
                window.open(`https://wa.me/50764426565?text=${encodeURIComponent(text)}`);
            };

            return (
                <div className="card">
                    <div className="q-title">{curr.t}</div>

                    {curr.opts && curr.opts.map(o => (
                        <button key={o} className={`btn-opt ${o.includes('PREMIUM') ? 'btn-premium' : ''}`} onClick={() => next(curr.f, o)}>
                            {o}
                        </button>
                    ))}

                    {curr.type === "address" && (
                        <div className="input-group">
                            <input className="input-f" placeholder="Nombre" onChange={e => setForm({...form, name: e.target.value})} />
                            <input className="input-f" placeholder="Apellido" onChange={e => setForm({...form, last: e.target.value})} />
                            <input className="input-f full" placeholder="DNI / Identificación" onChange={e => setForm({...form, dni: e.target.value})} />
                            <input className="input-f" placeholder="País" onChange={e => setForm({...form, country: e.target.value})} />
                            <input className="input-f" placeholder="Ciudad" onChange={e => setForm({...form, city: e.target.value})} />
                            <input className="input-f full" placeholder="Dirección Exacta" onChange={e => setForm({...form, address: e.target.value})} />
                            <input className="input-f" placeholder="Teléfono" onChange={e => setForm({...form, phone: e.target.value})} />
                            <input className="input-f" placeholder="Email" onChange={e => setForm({...form, email: e.target.value})} />
                            <button className="btn-buy full" onClick={() => setStep(step+1)}>GUARDAR DATOS</button>
                        </div>
                    )}

                    {curr.type === "pay" && (
                        <div>
                            <button className="btn-buy" style={{background: '#fff'}} onClick={() => sendWA('PLATAFORMA DIGITAL')}>💳 PAGAR EN PLATAFORMA</button>
                            <button className="btn-buy" style={{marginTop: '10px'}} onClick={() => sendWA('WESTERN UNION')}>🏦 WESTERN UNION / OTROS</button>
                            <p style={{fontSize: '10px', textAlign: 'center', color: '#888', marginTop: '10px'}}>Un asesor cerrará los detalles finales contigo por WhatsApp.</p>
                        </div>
                    )}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
