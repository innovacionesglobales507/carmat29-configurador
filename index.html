<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CAR MATS 29 - CONFIGURADOR IA</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Exo+2:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #39ff14; --premium: #ffd700; --dark: #000; }
        body { background: transparent; color: #fff; font-family: 'Exo 2', sans-serif; margin: 0; padding: 10px; }
        .card { background: rgba(0,0,0,0.95); border: 2px solid var(--neon); border-radius: 20px; padding: 20px; box-shadow: 0 0 25px rgba(57,255,20,0.2); max-width: 450px; margin: 0 auto; text-align: center; }
        .logo { font-family: 'Rajdhani'; font-size: 26px; color: var(--neon); letter-spacing: 3px; margin-bottom: 20px; text-transform: uppercase; }
        .btn-main { width: 100%; padding: 18px; border-radius: 12px; border: none; font-family: 'Rajdhani'; font-weight: 700; font-size: 18px; cursor: pointer; background: var(--neon); color: #000; text-transform: uppercase; margin-top: 10px; }
        .btn-opt { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 1px solid var(--neon); background: transparent; color: #fff; font-weight: 600; cursor: pointer; text-align: left; }
        .btn-premium { border-color: var(--premium); color: var(--premium); background: rgba(255,215,0,0.05); }
        .input-f { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--neon); background: #111; color: #fff; margin-bottom: 10px; box-sizing: border-box; }
        .scanner { position: relative; width: 100%; height: 250px; border-radius: 15px; overflow: hidden; border: 1px solid var(--neon); margin: 15px 0; }
        .line { width: 100%; height: 3px; background: var(--neon); position: absolute; top: 0; box-shadow: 0 0 15px var(--neon); animation: scan 2s linear infinite; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useRef } = React;

        function App() {
            const [step, setStep] = useState('home');
            const [image, setImage] = useState(null);
            const [form, setForm] = useState({});
            const fileInput = useRef();

            const handleFile = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    setImage(ev.target.result);
                    setStep('scanning');
                    setTimeout(() => setStep('q1'), 3500); // Tiempo para el efecto visual
                };
                reader.readAsDataURL(file);
            };

            const next = (field, val, nextStep) => {
                setForm({...form, [field]: val});
                setStep(nextStep);
            };

            const finalize = (pay) => {
                const msg = `PEDIDO CAR MATS 29: ${form.seats}, ${form.shipping}, Cliente: ${form.name}, Pago: ${pay}`;
                window.open(`https://wa.me/50764426565?text=${encodeURIComponent(msg)}`);
            };

            return (
                <div className="card">
                    <div className="logo">CAR MATS 29</div>

                    {step === 'home' && (
                        <div>
                            <div style={{fontSize: '50px', marginBottom: '15px'}}>📸</div>
                            <h2 style={{color: 'var(--neon)', fontSize: '20px'}}>ESCANEO IA DE VEHÍCULO</h2>
                            <p style={{fontSize: '14px', color: '#888', marginBottom: '20px'}}>Sube una foto para identificar tu modelo y personalizar tus alfombras 5D.</p>
                            <button className="btn-main" onClick={() => fileInput.current.click()}>SELECCIONAR FOTO</button>
                            <input type="file" ref={fileInput} hidden accept="image/*" onChange={handleFile} />
                        </div>
                    )}

                    {step === 'scanning' && (
                        <div>
                            <h2 style={{color: 'var(--neon)'}}>ANALIZANDO...</h2>
                            <div className="scanner">
                                <img src={image} style={{width:'100%', height:'100%', objectFit:'cover'}} />
                                <div className="line"></div>
                            </div>
                        </div>
                    )}

                    {step === 'q1' && (
                        <div>
                            <h3 style={{color: 'var(--neon)'}}>¿Capacidad de Asientos?</h3>
                            <button className="btn-opt" onClick={()=>next('seats', '2 Asientos', 'q2')}>2 Pasajeros</button>
                            <button className="btn-opt" onClick={()=>next('seats', '5 Asientos ($290+)', 'q2')}>5 Pasajeros ($290+)</button>
                            <button className="btn-opt" onClick={()=>next('seats', '7 Asientos', 'q2')}>7 Pasajeros</button>
                            <button className="btn-opt" onClick={()=>next('seats', '9-15 Asientos', 'q2')}>9-15 Pasajeros</button>
                        </div>
                    )}

                    {step === 'q2' && (
                        <div>
                            <h3 style={{color: 'var(--neon)'}}>Método de Envío</h3>
                            <button className="btn-opt btn-premium" onClick={()=>next('shipping', 'PREMIUM GRATIS', 'address')}>🚀 PREMIUM GRATIS (5-10 días)</button>
                            <button className="btn-opt" onClick={()=>next('shipping', 'Aéreo $10/kg', 'address')}>✈️ AÉREO (5-10 días)</button>
                            <button className="btn-opt" onClick={()=>next('shipping', 'Marítimo $4.40/kg', 'address')}>🚢 MARÍTIMO (25-30 días)</button>
                        </div>
                    )}

                    {step === 'address' && (
                        <div>
                            <h3 style={{color: 'var(--neon)'}}>Datos de Envío</h3>
                            <input className="input-f" placeholder="Nombre completo" onChange={e=>setForm({...form, name: e.target.value})} />
                            <input className="input-f" placeholder="DNI / Identificación" onChange={e=>setForm({...form, dni: e.target.value})} />
                            <input className="input-f" placeholder="País / Ciudad" onChange={e=>setForm({...form, city: e.target.value})} />
                            <input className="input-f" placeholder="Dirección exacta" onChange={e=>setForm({...form, addr: e.target.value})} />
                            <button className="btn-main" onClick={()=>setStep('pay')}>CONTINUAR</button>
                        </div>
                    )}

                    {step === 'pay' && (
                        <div>
                            <h3 style={{color: 'var(--neon)'}}>Finalizar Pedido</h3>
                            <button className="btn-main" style={{background:'#fff'}} onClick={()=>finalize('PAGO DIGITAL')}>💳 PAGO DIGITAL</button>
                            <button className="btn-main" onClick={()=>finalize('WESTERN UNION')}>🏦 WESTERN UNION</button>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
