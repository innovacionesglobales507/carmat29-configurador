<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CarMat29 – Configurador IA</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #050a05; min-height: 100vh; }

.app {
  min-height: 100vh;
  background: #050a05;
  font-family: 'Exo 2', sans-serif;
  color: #e0ffe0;
  position: relative;
  overflow-x: hidden;
}
.grid-bg {
  position: fixed; inset: 0; z-index: 0;
  background-image:
    linear-gradient(rgba(57,255,20,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(57,255,20,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}
.glow-orb {
  position: fixed;
  width: 600px; height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(57,255,20,0.08) 0%, transparent 70%);
  top: -200px; right: -200px;
  pointer-events: none; z-index: 0;
}
.container {
  position: relative; z-index: 1;
  max-width: 480px;
  margin: 0 auto;
  padding: 24px 16px 60px;
}
.header { text-align: center; margin-bottom: 32px; }
.logo {
  font-family: 'Rajdhani', sans-serif;
  font-size: 32px; font-weight: 700; letter-spacing: 3px;
  background: linear-gradient(135deg, #39ff14, #218838, #39ff14);
  background-size: 200% 200%;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: shimmer 3s ease infinite;
}
@keyframes shimmer { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
.tagline {
  font-size: 11px; letter-spacing: 4px;
  color: rgba(57,255,20,0.5); text-transform: uppercase; margin-top: 4px;
}
.upload-zone {
  border: 2px dashed rgba(57,255,20,0.3);
  border-radius: 16px; padding: 40px 20px;
  text-align: center; cursor: pointer;
  transition: all 0.3s;
  background: rgba(57,255,20,0.03);
}
.upload-zone:hover {
  border-color: #39ff14;
  background: rgba(57,255,20,0.07);
  box-shadow: 0 0 40px rgba(57,255,20,0.15);
}
.upload-icon {
  font-size: 56px; margin-bottom: 16px; display: block;
  animation: float 3s ease-in-out infinite;
}
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
.upload-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 20px; font-weight: 700; color: #39ff14; margin-bottom: 8px;
}
.upload-sub { font-size: 13px; color: rgba(224,255,224,0.5); line-height: 1.6; }
.btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
.btn {
  padding: 14px; border-radius: 10px; border: none;
  font-family: 'Rajdhani', sans-serif; font-size: 15px; font-weight: 700;
  letter-spacing: 1px; cursor: pointer; transition: all 0.2s; text-transform: uppercase;
}
.btn-neon {
  background: #39ff14; color: #050a05;
  box-shadow: 0 0 20px rgba(57,255,20,0.4);
}
.btn-neon:hover { box-shadow: 0 0 35px rgba(57,255,20,0.7); transform: translateY(-1px); }
.btn-ghost {
  background: transparent; color: #39ff14;
  border: 1.5px solid rgba(57,255,20,0.4);
}
.btn-ghost:hover { border-color: #39ff14; background: rgba(57,255,20,0.07); }
.btn-full { width: 100%; padding: 16px; font-size: 17px; margin-top: 12px; }
.preview-wrap {
  position: relative; border-radius: 16px; overflow: hidden;
  margin-bottom: 16px; border: 1.5px solid rgba(57,255,20,0.2);
}
.preview-img { width: 100%; max-height: 260px; object-fit: cover; display: block; }
.preview-badge {
  position: absolute; bottom: 12px; right: 12px;
  background: rgba(5,10,5,0.85);
  border: 1px solid rgba(57,255,20,0.4);
  border-radius: 8px; padding: 6px 12px;
  font-size: 11px; color: #39ff14; letter-spacing: 1px; text-transform: uppercase;
}
.analyzing-wrap { text-align: center; padding: 40px 20px; }
.radar {
  width: 100px; height: 100px; border-radius: 50%;
  border: 2px solid rgba(57,255,20,0.2);
  margin: 0 auto 24px; position: relative;
  display: flex; align-items: center; justify-content: center;
}
.radar::before {
  content: ''; position: absolute; inset: 8px;
  border-radius: 50%; border: 2px solid rgba(57,255,20,0.15);
}
.radar-sweep {
  position: absolute; inset: 0; border-radius: 50%;
  background: conic-gradient(rgba(57,255,20,0.6) 0deg, transparent 90deg, transparent 360deg);
  animation: sweep 1.5s linear infinite;
}
@keyframes sweep { to { transform: rotate(360deg); } }
.radar-dot {
  width: 12px; height: 12px; background: #39ff14;
  border-radius: 50%; box-shadow: 0 0 15px #39ff14; z-index: 1;
}
.analyzing-title { font-family: 'Rajdhani', sans-serif; font-size: 22px; color: #39ff14; margin-bottom: 8px; }
.analyzing-sub { font-size: 13px; color: rgba(57,255,20,0.5); animation: pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
.result-car {
  background: rgba(57,255,20,0.05);
  border: 1px solid rgba(57,255,20,0.2);
  border-radius: 12px; padding: 16px; margin-bottom: 20px;
  display: flex; align-items: center; gap: 14px;
}
.car-icon { font-size: 40px; }
.car-name { font-family: 'Rajdhani', sans-serif; font-size: 22px; font-weight: 700; color: #39ff14; line-height: 1; }
.car-detail { font-size: 12px; color: rgba(224,255,224,0.5); margin-top: 4px; }
.section-label { font-size: 10px; letter-spacing: 3px; color: rgba(57,255,20,0.5); text-transform: uppercase; margin-bottom: 12px; }
.products-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.product-card {
  border-radius: 12px; padding: 14px 16px; cursor: pointer; transition: all 0.2s;
  border: 1.5px solid rgba(57,255,20,0.1); background: rgba(57,255,20,0.03);
  display: flex; align-items: center; gap: 14px;
}
.product-card.active {
  border-color: #39ff14; background: rgba(57,255,20,0.08);
  box-shadow: 0 0 20px rgba(57,255,20,0.15);
}
.product-emoji { font-size: 28px; flex-shrink: 0; }
.product-info { flex: 1; }
.product-name { font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: 700; color: #e0ffe0; }
.product-desc { font-size: 11px; color: rgba(224,255,224,0.45); margin-top: 2px; }
.product-tag {
  font-size: 9px; letter-spacing: 1.5px; font-weight: 700;
  background: rgba(57,255,20,0.15); color: #39ff14;
  padding: 3px 8px; border-radius: 4px; flex-shrink: 0;
}
.reason-box {
  background: rgba(57,255,20,0.05);
  border-left: 3px solid #39ff14;
  border-radius: 0 10px 10px 0;
  padding: 12px 16px; font-size: 13px;
  color: rgba(224,255,224,0.7); line-height: 1.5;
  margin-bottom: 20px; font-style: italic;
}
.wa-btn {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 18px; border-radius: 14px;
  background: linear-gradient(135deg, #25d366, #128c7e);
  border: none; color: white;
  font-family: 'Rajdhani', sans-serif; font-size: 18px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  cursor: pointer; text-decoration: none;
  box-shadow: 0 4px 30px rgba(37,211,102,0.4); transition: all 0.2s;
}
.wa-btn:hover { box-shadow: 0 4px 50px rgba(37,211,102,0.6); transform: translateY(-2px); }
.restart-btn {
  display: block; width: 100%; text-align: center;
  margin-top: 12px; padding: 12px;
  background: transparent; border: 1px solid rgba(57,255,20,0.2);
  border-radius: 10px; color: rgba(57,255,20,0.5);
  font-family: 'Rajdhani', sans-serif; font-size: 13px;
  letter-spacing: 1px; cursor: pointer; transition: all 0.2s; text-transform: uppercase;
}
.restart-btn:hover { color: #39ff14; border-color: rgba(57,255,20,0.5); }
.error-box {
  background: rgba(255,50,50,0.08); border: 1px solid rgba(255,50,50,0.3);
  border-radius: 10px; padding: 14px; font-size: 13px;
  color: #ff8080; text-align: center; margin-top: 12px;
}
input[type=file] { display: none; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useCallback } = React;

const WHATSAPP_URL = "https://wa.me/message/RZZJS4PD7KORB1";

const PRODUCTS = [
  { id: 1, name: "TPE 5D Premium Negro", desc: "2 filas, clips metálicos, bordes curvos 3D, talón reforzado", emoji: "⬛", tag: "MÁS VENDIDO" },
  { id: 2, name: "Eco-Cuero Café/Negro", desc: "3 filas completas, clips dorados, acabado premium", emoji: "🟫", tag: "LUJO" },
  { id: 3, name: "Set Completo 3 Filas", desc: "Negro con clips plateados, cobertura total", emoji: "🖤", tag: "FULL SET" },
  { id: 4, name: "Zebra Wave Nissan", desc: "Negro + beige, clips dorados, patrón exclusivo", emoji: "🦓", tag: "EXCLUSIVO" },
  { id: 5, name: "Toyota Zebra Premium", desc: "Logo lateral Toyota, clips dorados — vino, beige, rosado, negro", emoji: "🏆", tag: "TOYOTA" },
  { id: 6, name: "TPE Puro Geométrico", desc: "Sin alfombra, patrón X/Z antideslizante, estilo WeatherTech", emoji: "🔷", tag: "SPORT" },
  { id: 7, name: "TPE Driver Mat", desc: "Pieza única conductor, relieve diagonal", emoji: "🎯", tag: "DRIVER" },
  { id: 8, name: "M-Sport Triple Franja", desc: "Azul+Rojo+Negro, base TPE navy — edición sport", emoji: "🏎️", tag: "M-SPORT" },
  { id: 9, name: "TPE Gris Geométrico", desc: "Patrón Z/flecha oscuro, 2 filas, sin alfombra", emoji: "🔘", tag: "DARK" },
  { id: 10, name: "Ford Ranger Rojo/Negro", desc: '2 filas + guardas laterales con grabado "RANGER"', emoji: "🔴", tag: "RANGER" },
];

const analyzeCarAndRecommend = async (base64Image, mimeType) => {
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      messages: [{
        role: "user",
        content: [
          { type: "image", source: { type: "base64", media_type: mimeType, data: base64Image } },
          { type: "text", text: `Eres el asesor experto de CarMat29, marca premium de alfombras para autos en Panamá. Analiza esta foto y responde SOLO con JSON sin texto extra ni backticks:
{"marca":"","modelo":"","año_estimado":"","tipo_interior":"","color_auto":"","productos_recomendados":[1,2,3],"razon_principal":"","mensaje_whatsapp":""}
IDs: 1=TPE 5D Negro, 2=Eco-Cuero Café/Negro, 3=Set 3 Filas, 4=Zebra Nissan, 5=Toyota Zebra, 6=TPE Geométrico WeatherTech, 7=Driver Mat, 8=M-Sport, 9=TPE Gris, 10=Ford Ranger. Si es Toyota usa 5. Si es Ranger usa 10. Si es Nissan considera 4. Recomienda exactamente 3.` }
        ]
      }]
    })
  });
  const data = await response.json();
  const text = data.content.map(i => i.text || "").join("");
  return JSON.parse(text.replace(/```json|```/g, "").trim());
};

function App() {
  const [step, setStep] = useState("upload");
  const [imagePreview, setImagePreview] = useState(null);
  const [imageBase64, setImageBase64] = useState(null);
  const [imageMime, setImageMime] = useState(null);
  const [analysis, setAnalysis] = useState(null);
  const [error, setError] = useState(null);
  const [selectedProduct, setSelectedProduct] = useState(null);
  const fileRef = useRef();
  const cameraRef = useRef();

  const handleFile = useCallback((file) => {
    if (!file) return;
    const mime = file.type;
    const reader = new FileReader();
    reader.onload = (e) => {
      const dataUrl = e.target.result;
      setImagePreview(dataUrl);
      setImageBase64(dataUrl.split(",")[1]);
      setImageMime(mime);
      setStep("ready");
    };
    reader.readAsDataURL(file);
  }, []);

  const handleAnalyze = async () => {
    setStep("analyzing");
    setError(null);
    try {
      const result = await analyzeCarAndRecommend(imageBase64, imageMime);
      setAnalysis(result);
      setSelectedProduct(result.productos_recomendados[0]);
      setStep("result");
    } catch (e) {
      setError("No pude analizar la imagen. Intenta con otra foto más clara.");
      setStep("ready");
    }
  };

  const getProduct = (id) => PRODUCTS.find(p => p.id === id);

  const reset = () => {
    setStep("upload"); setImagePreview(null);
    setAnalysis(null); setSelectedProduct(null); setError(null);
  };

  return (
    <div className="app">
      <div className="grid-bg" />
      <div className="glow-orb" />
      <div className="container">
        <div className="header">
          <div className="logo">CARMAT29</div>
          <div className="tagline">Configurador IA · Alfombras Premium</div>
        </div>

        {step === "upload" && (
          <div className="upload-zone" onClick={() => fileRef.current.click()}>
            <span className="upload-icon">🚗</span>
            <div className="upload-title">Sube la foto de tu auto</div>
            <div className="upload-sub">La IA analiza tu vehículo y recomienda<br/>las alfombras perfectas de CarMat29</div>
            <div className="btn-row">
              <button className="btn btn-neon" onClick={e => { e.stopPropagation(); fileRef.current.click(); }}>📁 Galería</button>
              <button className="btn btn-ghost" onClick={e => { e.stopPropagation(); cameraRef.current.click(); }}>📷 Cámara</button>
            </div>
          </div>
        )}

        {step === "ready" && (
          <div>
            <div className="preview-wrap">
              <img src={imagePreview} alt="Tu auto" className="preview-img" />
              <div className="preview-badge">✓ Lista para analizar</div>
            </div>
            <button className="btn btn-neon btn-full" onClick={handleAnalyze}>⚡ Analizar con IA</button>
            <button className="btn btn-ghost btn-full" onClick={reset}>Cambiar foto</button>
            {error && <div className="error-box">{error}</div>}
          </div>
        )}

        {step === "analyzing" && (
          <div>
            <div className="preview-wrap">
              <img src={imagePreview} alt="Tu auto" className="preview-img" style={{opacity:0.4}} />
            </div>
            <div className="analyzing-wrap">
              <div className="radar">
                <div className="radar-sweep" />
                <div className="radar-dot" />
              </div>
              <div className="analyzing-title">Analizando tu auto...</div>
              <div className="analyzing-sub">IA identificando modelo y recomendando alfombras</div>
            </div>
          </div>
        )}

        {step === "result" && analysis && (
          <div>
            <div className="result-car">
              <div className="car-icon">🚗</div>
              <div>
                <div className="car-name">{analysis.marca} {analysis.modelo}</div>
                <div className="car-detail">{analysis.año_estimado} · {analysis.tipo_interior} · {analysis.color_auto}</div>
              </div>
            </div>
            <div className="section-label">Alfombras recomendadas para tu auto</div>
            <div className="products-grid">
              {analysis.productos_recomendados.map(id => {
                const p = getProduct(id);
                if (!p) return null;
                return (
                  <div key={id} className={`product-card ${selectedProduct === id ? "active" : ""}`} onClick={() => setSelectedProduct(id)}>
                    <div className="product-emoji">{p.emoji}</div>
                    <div className="product-info">
                      <div className="product-name">{p.name}</div>
                      <div className="product-desc">{p.desc}</div>
                    </div>
                    <div className="product-tag">{p.tag}</div>
                  </div>
                );
              })}
            </div>
            {analysis.razon_principal && (
              <div className="reason-box">💡 {analysis.razon_principal}</div>
            )}
            <a className="wa-btn" href={WHATSAPP_URL} target="_blank" rel="noreferrer">
              <span>💬</span><span>Pedir por WhatsApp</span>
            </a>
            <button className="restart-btn" onClick={reset}>↩ Analizar otro auto</button>
          </div>
        )}

        <input ref={fileRef} type="file" accept="image/*" onChange={e => handleFile(e.target.files[0])} />
        <input ref={cameraRef} type="file" accept="image/*" capture="environment" onChange={e => handleFile(e.target.files[0])} />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
  </html>
