<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarMat29 – Configurador IA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #39ff14; --dark: #050a05; }
        body { background: var(--dark); color: #e0ffe0; font-family: 'Exo 2', sans-serif; margin: 0; padding: 15px; }
        .app-container { max-width: 480px; margin: 0 auto; }
        .logo { font-family: 'Rajdhani', sans-serif; font-size: 30px; font-weight: 700; color: var(--neon); text-align: center; letter-spacing: 3px; margin-bottom: 20px; text-shadow: 0 0 10px rgba(57,255,20,0.5); }
        .card { background: rgba(57,255,20,0.03); border: 1.5px solid rgba(57,255,20,0.2); border-radius: 16px; padding: 25px; text-align: center; }
        .upload-area { border: 2px dashed rgba(57,255,20,0.4); border-radius: 12px; padding: 30px 15px; cursor: pointer; }
        .btn { width: 100%; padding: 16px; border-radius: 10px; border: none; font-family: 'Rajdhani', sans-serif; font-weight: 700; cursor: pointer; text-transform: uppercase; margin-top: 15px; font-size: 16px; }
        .btn-neon { background: var(--neon); color: var(--dark); box-shadow: 0 0 15px rgba(57,255,20,0.3); }
        .preview-img { width: 100%; border-radius: 12px; border: 1px solid var(--neon); margin-bottom: 15px; }
        .loading { padding: 30px; font-weight: bold; color: var(--neon); text-align: center; }
        .result-card { background: rgba(57,255,20,0.08); border: 1px solid var(--neon); border-radius: 12px; padding: 20px; margin-top: 20px; text-align: left; }
        .wa-btn { display: flex; align-items: center; justify-content: center; gap: 10px; background: #25d366; color: white; text-decoration: none; padding: 18px; border-radius: 12px; font-weight: bold; margin-top: 20px; font-family: 'Rajdhani', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useRef } = React;

        // TU ENLACE DE RAILWAY YA INTEGRADO
        const RAILWAY_URL = "https://carmat-server-production.up.railway.app/analyze"; 

        function App() {
            const [step, setStep] = useState('home'); 
            const [image, setImage] = useState(null);
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(false);
            const fileInput = useRef();

            const onFile = (e) => {
                const file = e.target.files[0];
                if(!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    setImage({ base64: ev.target.result.split(',')[1], preview: ev.target.result, mime: file.type });
                    setStep('ready');
                };
                reader.readAsDataURL(file);
            };

            const analyze = async () => {
                setLoading(true);
                try {
                    const res = await fetch(RAILWAY_URL, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ image: image.base64, mimeType: image.mime })
                    });
                    const result = await res.json();
                    setData(result);
                    setStep('result');
                } catch (e) {
                    alert("Error en la conexión. Verifica que Railway esté encendido.");
                } finally { setLoading(false); }
            };

            return (
                <div className="app-container">
                    <div className="logo">INNOVACIONES GLOBALES 507</div>
                    {step === 'home' && (
                        <div className="card">
                            <div className="upload-area" onClick={() => fileInput.current.click()}>
                                <div style={{fontSize:'50px'}}>📸</div>
                                <div style={{color: 'var(--neon)', fontWeight:'bold'}}>SUBE FOTO DE TU AUTO</div>
                                <input type="file" ref={fileInput} hidden accept="image/*" onChange={onFile} />
                            </div>
                            <button className="btn btn-neon" onClick={() => fileInput.current.click()}>SELECCIONAR</button>
                        </div>
                    )}
                    {step === 'ready' && !loading && (
                        <div className="card">
                            <img src={image.preview} className="preview-img" />
                            <button className="btn btn-neon" onClick={analyze}>⚡ IDENTIFICAR VEHÍCULO</button>
                            <button className="btn" style={{background: 'transparent', color: '#666'}} onClick={() => setStep('home')}>CAMBIAR FOTO</button>
                        </div>
                    )}
                    {loading && <div className="loading">IDENTIFICANDO MODELO...</div>}
                    {step === 'result' && data && (
                        <div className="result-card">
                            <h2 style={{color:'var(--neon)', margin: '0 0 10px 0'}}>{data.marca} {data.modelo}</h2>
                            <p style={{fontSize: '14px', lineHeight: '1.5'}}>{data.razon}</p>
                            <a href={`https://wa.me/507XXXXXXXX?text=Hola! La IA identificó mi ${data.marca} ${data.modelo}. Quiero mis alfombras CarMat29.`} className="wa-btn" target="_blank">
                                💬 COTIZAR ALFOMBRAS
                            </a>
                            <button className="btn" style={{background: 'rgba(255,255,255,0.05)', color: '#fff'}} onClick={() => setStep('home')}>NUEVA CONSULTA</button>
                        </div>
                    )}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
